<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sandy B. Patterson</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;600&display=swap');
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background-color: #f5f0e8;
        color: #2c2416;
        font-family: 'EB Garamond', Georgia, serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 5rem 2rem 6rem;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      body.dark {
        background-color: #1a1a1a;
        color: #e8e0d0;
      }
      .moon-toggle {
        position: fixed;
        top: 1.2rem;
        right: 1.5rem;
        font-size: 1.4rem;
        cursor: pointer;
        color: #4a7fc1;
        background: none;
        border: none;
        line-height: 1;
        z-index: 999;
        transition: color 0.3s ease;
      }
      body.dark .moon-toggle { color: #ffffff; }
      .author-name {
        font-family: 'Cinzel', serif;
        font-size: 2.2rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        color: #2c2416;
        text-align: center;
        margin-bottom: 0.5rem;
        transition: color 0.3s ease;
      }
      body.dark .author-name { color: #e8e0d0; }
      .author-tagline {
        font-family: 'EB Garamond', serif;
        font-style: italic;
        font-size: 1.05rem;
        color: #6b5a3e;
        text-align: center;
        margin-bottom: 4rem;
        transition: color 0.3s ease;
      }
      body.dark .author-tagline { color: #a89880; }
      .divider {
        width: 60px;
        height: 1px;
        background: #b8a98a;
        margin: 0 auto 4rem;
      }
      body.dark .divider { background: #444; }
      .shelf {
        display: flex;
        gap: 3rem;
        flex-wrap: wrap;
        justify-content: center;
      }
      .book {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-decoration: none;
        width: 160px;
      }
      .book-cover {
        width: 160px;
        height: 220px;
        background: #2c2416;
        border-radius: 3px 6px 6px 3px;
        box-shadow: 4px 6px 18px rgba(44,36,22,0.3);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 1.5rem 1rem;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        position: relative;
      }
      body.dark .book-cover { background: #2a2a2a; box-shadow: 4px 6px 18px rgba(0,0,0,0.5); }
      .book-cover::before {
        content: '';
        position: absolute;
        left: 0; top: 0; bottom: 0;
        width: 12px;
        background: rgba(255,255,255,0.06);
        border-radius: 3px 0 0 3px;
      }
      .book:hover .book-cover {
        transform: translateY(-6px);
        box-shadow: 0 12px 30px rgba(44,36,22,0.22);
      }
      .book-cover-title {
        font-family: 'Cinzel', serif;
        font-size: 0.78rem;
        font-weight: 600;
        color: #f5f0e8;
        text-align: center;
        letter-spacing: 0.08em;
        line-height: 1.5;
      }
      .book-cover-ornament {
        color: #b8a98a;
        font-size: 1rem;
        margin: 0.8rem 0;
        letter-spacing: 0.3em;
      }
      .book-cover-author {
        font-family: 'EB Garamond', serif;
        font-style: italic;
        font-size: 0.68rem;
        color: #b8a98a;
        text-align: center;
        position: absolute;
        bottom: 1rem;
      }
      .book-label {
        margin-top: 1rem;
        font-family: 'Cinzel', serif;
        font-size: 0.68rem;
        letter-spacing: 0.15em;
        color: #8a7355;
        text-align: center;
        text-transform: uppercase;
      }
      body.dark .book-label { color: #a89880; }
      .book.locked .book-cover { background: #a89880; opacity: 0.6; cursor: default; }
      body.dark .book.locked .book-cover { background: #333; }
      .book.locked:hover .book-cover { transform: none; box-shadow: 4px 6px 18px rgba(44,36,22,0.3); }
      .book.locked .book-label { color: #b8a98a; }
    </style>
  </head>
  <body>
    <button class="moon-toggle" onclick="toggleDark()" title="Toggle dark mode">&#9790;</button>
    <div class="author-name">Sandy B. Patterson</div>
    <div class="author-tagline">Stories from the American South</div>
    <div class="divider"></div>
    <div class="shelf">
      <a href="/stories/" class="book">
        <div class="book-cover">
          <div class="book-cover-title">Stories from Winchester</div>
          <div class="book-cover-ornament">&#10022;</div>
          <div class="book-cover-author">Sandy B. Patterson</div>
        </div>
        <div class="book-label">Read Now</div>
      </a>
      <div class="book locked">
        <div class="book-cover">
          <div class="book-cover-title">Coming Soon</div>
        </div>
        <div class="book-label">Coming Soon</div>
      </div>
    </div>
    <script>
      if (localStorage.getItem('darkMode') === 'on') {
        document.body.classList.add('dark');
      }
      function toggleDark() {
        document.body.classList.toggle('dark');
        localStorage.setItem('darkMode', document.body.classList.contains('dark') ? 'on' : 'off');
      }
    </script>
  </body>
</html>
